name: K1W1 App Build

on:
  # Triggered by Supabase Function via repository_dispatch
  repository_dispatch:
    types: [trigger-eas-build]

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      job_id:
        description: "Optional Job ID from K1W1 App (for status tracking)"
        required: false
        type: string
      profile:
        description: "EAS build profile (development|preview|production)"
        required: false
        default: "preview"
        type: string

permissions:
  contents: read

concurrency:
  group: k1w1-build-${{ github.event.client_payload.job_id || inputs.job_id || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      # From repository_dispatch payload
      JOB_ID: ${{ github.event.client_payload.job_id || inputs.job_id || '' }}
      PROFILE: ${{ github.event.client_payload.build_profile || github.event.client_payload.profile || inputs.profile || 'preview' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate profile
        shell: bash
        run: |
          set -euo pipefail
          case "${PROFILE}" in
            development|preview|production) echo "✓ profile=${PROFILE}" ;;
            *) echo "::error::Invalid profile '${PROFILE}'"; exit 1 ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Setup Expo Application Services
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Auto-detect native deps (install + plugins)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/k1w1-sync-native.mjs --apply

      - name: Update Supabase status -> building (optional)
        if: ${{ env.JOB_ID != '' }}
        shell: bash
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "::warning::Supabase secrets missing, skipping status update."
            exit 0
          fi
          curl --fail-with-body -X PATCH "${SUPABASE_URL}/rest/v1/build_jobs?id=eq.${JOB_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"building\",\"github_run_id\":\"${GITHUB_RUN_ID}\"}" \
            --silent

      - name: Run EAS Build (wait + JSON)
        id: eas
        shell: bash
        run: |
          set -euo pipefail
          echo "Starting EAS build (profile=${PROFILE})..."
          eas build --platform android --profile "${PROFILE}" --non-interactive --json > eas_build.json
          cat eas_build.json

          BUILD_ID="$(jq -r '.[0].id // empty' eas_build.json)"
          if [[ -z "${BUILD_ID}" ]]; then
            echo "::error::Could not parse build id from EAS JSON"
            exit 1
          fi

          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"

          eas build:view "${BUILD_ID}" --json > eas_build_view.json
          cat eas_build_view.json

          ARTIFACT_URL="$(jq -r '.artifacts.buildUrl // .artifacts.applicationArchiveUrl // .artifacts.appUrl // empty' eas_build_view.json)"
          BUILD_URL="$(jq -r '.buildUrl // .url // empty' eas_build_view.json)"

          echo "artifact_url=${ARTIFACT_URL}" >> "$GITHUB_OUTPUT"
          echo "build_url=${BUILD_URL}" >> "$GITHUB_OUTPUT"

      - name: Update build status -> success (optional)
        if: ${{ success() && env.JOB_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "::warning::Supabase secrets missing, skipping status update."
            exit 0
          fi
          curl --fail-with-body -X PATCH "${SUPABASE_URL}/rest/v1/build_jobs?id=eq.${JOB_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"success\",\"eas_build_id\":\"${{ steps.eas.outputs.build_id }}\",\"artifact_url\":\"${{ steps.eas.outputs.artifact_url }}\",\"build_url\":\"${{ steps.eas.outputs.build_url }}\"}" \
            --silent

      - name: Update build status -> error (optional)
        if: ${{ failure() && env.JOB_ID != '' }}
        shell: bash
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "::warning::Supabase secrets missing, skipping status update."
            exit 0
          fi
          curl --fail-with-body -X PATCH "${SUPABASE_URL}/rest/v1/build_jobs?id=eq.${JOB_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"github_run_id\":\"${GITHUB_RUN_ID}\"}" \
            --silent
