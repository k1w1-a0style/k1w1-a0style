name: K1W1 Sync Native Deps

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Install missing deps (true/false)"
        required: false
        default: "true"
      create_pr:
        description: "Create PR with changes (true/false)"
        required: false
        default: "false"
      base_ref:
        description: "Base branch/ref"
        required: false
        default: "main"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-native:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APPLY: ${{ inputs.apply || 'true' }}
      CREATE_PR: ${{ inputs.create_pr || 'false' }}
      BASE_REF: ${{ inputs.base_ref || 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci || npm install

      - name: Run native sync scan
        run: |
          set -euo pipefail
          if [[ "${APPLY}" == "true" ]]; then
            node scripts/k1w1-sync-native.mjs --apply
          else
            node scripts/k1w1-sync-native.mjs
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: k1w1-native-autogen
          path: scripts/.k1w1-native-autogen.json
          retention-days: 7

      - name: Create PR (optional)
        if: ${{ env.CREATE_PR == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync native deps (autogen)"
          title: "Sync native deps (autogen)"
          body: |
            Auto-generated update from scripts/k1w1-sync-native.mjs.
            Includes dependency/plugin alignment for Expo/EAS.
          branch: k1w1/native-sync
          delete-branch: true

      - name: Summary
        run: |
          echo "## K1W1 Native Sync" >> $GITHUB_STEP_SUMMARY
          echo "- Apply: ${APPLY}" >> $GITHUB_STEP_SUMMARY
          echo "- Base Ref: ${BASE_REF}" >> $GITHUB_STEP_SUMMARY
          echo "- Report: scripts/.k1w1-native-autogen.json (artifact)" >> $GITHUB_STEP_SUMMARY
